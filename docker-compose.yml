services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rest_api_assessment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rest_api_assessment"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/rest_api_assessment
      GITHUB_API_BASE_URL: https://api.github.com
      GITHUB_TOKEN: ""
      HTTP_TIMEOUT_SECONDS: "10"
      LOG_LEVEL: INFO
    command: sh -c "python scripts/init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
